name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check diff for whitespace errors (pull requests only)
        if: github.event_name == 'pull_request'
        run: git diff --check ${{ github.event.pull_request.base.sha }}...${{ github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check formatting
        run: |
          fmt_diff="$(gofmt -l .)"
          if [ -n "$fmt_diff" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$fmt_diff"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Test with race detector
        run: go test -race ./...
